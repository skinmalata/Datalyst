services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trueanalyzer
      POSTGRES_USER: trueanalyzer
      POSTGRES_PASSWORD: trueanalyzer
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data", "./server/sql:/docker-entrypoint-initdb.d:ro"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  api:
    build: ./server
    env_file: .env
    ports: ["3001:3001"]
    depends_on: [postgres, redis, analytics]
    volumes: ["./uploads:/app/uploads"]
  analytics:
    build: ./analytics-service
    ports: ["8000:8000"]
volumes:
  postgres_data:
